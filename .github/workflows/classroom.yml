name: Autograding R

on: [push]

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем код, который отправил студент
      - name: Checkout student code
        uses: actions/checkout@v4

      # 2. Скачиваем скрытые тесты из вашего приватного репозитория hw1-tests
      - name: Fetch hidden tests
        uses: actions/checkout@v4
        with:
          repository: 'rantiquity/hw-1-tests'
          token: ${{ secrets.TESTS_DOWNLOAD_TOKEN }}

      # 3. Разворачиваем среду R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      # 4. Устанавливаем пакет testthat для проверки
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::testthat

      # 5. Запускаем скрытые тесты. Файл студента solution.R будет виден скрипту.
      - name: Run hidden tests
        run: |
          Rscript -e 'testthat::test_file("test_hidden.R")'
